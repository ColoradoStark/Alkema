services:
  postgres:
    image: postgres:16-alpine
    container_name: alkema-postgres
    environment:
      POSTGRES_USER: alkema_user
      POSTGRES_PASSWORD: alkema_pass
      POSTGRES_DB: alkema_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alkema_user -d alkema_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  legacy-generator:
    image: nginx:1.29.0
    container_name: legacy-generator
    ports:
      - "8080:80"
    volumes:
      - ./Universal-LPC-Spritesheet-Character-Generator:/usr/share/nginx/html:ro
      - ./Universal-LPC-Spritesheet-Character-Generator/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  api-character-sprite-generator:
    build: ./API-Character-Sprite-Generator
    container_name: api-character-sprite-generator
    ports:
      - "8000:8000"
    volumes:
      - ./API-Character-Sprite-Generator:/app
      - ./Universal-LPC-Spritesheet-Character-Generator:/generator:ro
    environment:
      DATABASE_URL: postgresql://alkema_user:alkema_pass@postgres:5432/alkema_db
      MONGODB_URI: mongodb://admin:adminpassword@mongodb:27017/alkema?authSource=admin
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; exit(0 if requests.get('http://localhost:8000/health').status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mongodb:
    image: mongo:7.0
    container_name: alkema-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: alkema
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  game-server:
    build: ./Alkema-Client/server
    container_name: alkema-game-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://admin:adminpassword@mongodb:27017/alkema?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      API_URL: http://api-character-sprite-generator:8000
      API_BASE_URL: http://api-character-sprite-generator:8000
    depends_on:
      - mongodb
      - api-character-sprite-generator
    volumes:
      - ./Alkema-Client/server:/app
      - /app/node_modules

  game-client:
    build: ./Alkema-Client/client
    container_name: alkema-game-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - game-server
    volumes:
      - ./Alkema-Client/client:/app
      - /app/node_modules

volumes:
  postgres_data:
  mongodb_data: