# Production overrides — used with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Adds caddy-net so Caddy (in Wordpress-Mega-Merger stack) can route to these containers.
# No ports exposed — Caddy handles all external access via z3q.com.
# ROOT_PATH=/api because Caddy's `handle_path /api/*` strips the /api prefix before proxying.

services:
  legacy-generator:
    networks:
      - default
      - caddy-net

  api-character-sprite-generator:
    environment:
      ROOT_PATH: /api
    networks:
      - default
      - caddy-net

  game-server:
    networks:
      - default
      - caddy-net

  game-client:
    networks:
      - default
      - caddy-net

networks:
  caddy-net:
    external: true
